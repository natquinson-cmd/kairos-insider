<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Fond principal : gradient sombre bleu-violet -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1226"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#2A1245"/>
    </linearGradient>
    <!-- Accent brand -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </radialGradient>
    <!-- Lueur d'accent en haut a droite -->
    <radialGradient id="glow" cx="85%" cy="15%" r="35%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grille subtile (lignes de prix en arriere-plan) -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Logo Kairos (grand, en haut a gauche) -->
  <g transform="translate(90, 110) scale(3.5)">
    <circle cx="20" cy="20" r="18.5" fill="none" stroke="url(#brand)" stroke-width="2.2"/>
    <polyline points="9,27 14,22.5 20,24.5 26,14 31,15.5" fill="none" stroke="url(#brand)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="26" cy="14" r="2.6" fill="url(#dot)"/>
    <circle cx="25.3" cy="13.3" r="0.6" fill="#FCE7F3" opacity="0.9"/>
  </g>

  <!-- Nom de la marque -->
  <text x="250" y="170" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="-1.5">
    Kairos <tspan fill="url(#brand)">Insider</tspan>
  </text>
  <text x="250" y="212" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="500" fill="#94A3B8" letter-spacing="0.3">
    Smart Money Intelligence · FR
  </text>

  <!-- Tagline principale -->
  <text x="90" y="360" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">
    Voyez ce que les
  </text>
  <text x="90" y="445" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#brand)">pros voient</tspan>
    <tspan fill="#ffffff">.</tspan>
  </text>

  <!-- Sous-titre / preuves sociales -->
  <g transform="translate(90, 500)" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
    <text x="0" y="20" font-size="20" font-weight="600" fill="#CBD5E1">
      Insiders · 13F Hedge Funds · Activists · ETF Rotations
    </text>
    <text x="0" y="55" font-size="17" font-weight="500" fill="#64748B">
      Kairos Score 0–100 · 3 500+ tickers · Clusters &amp; signaux temps reel
    </text>
  </g>

  <!-- Pastille CTA en bas a droite -->
  <g transform="translate(890, 500)">
    <rect x="0" y="0" width="220" height="70" rx="35" fill="url(#brand)"/>
    <text x="110" y="44" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.3">
      kairosinsider.fr
    </text>
  </g>

  <!-- Accent decoratif : bougie candle up en haut droite -->
  <g transform="translate(1000, 80)" opacity="0.85">
    <rect x="0" y="20" width="8" height="80" fill="#10B981" rx="2"/>
    <line x1="4" y1="0" x2="4" y2="20" stroke="#10B981" stroke-width="2"/>
    <line x1="4" y1="100" x2="4" y2="130" stroke="#10B981" stroke-width="2"/>

    <rect x="30" y="55" width="8" height="65" fill="#EF4444" rx="2"/>
    <line x1="34" y1="35" x2="34" y2="55" stroke="#EF4444" stroke-width="2"/>
    <line x1="34" y1="120" x2="34" y2="145" stroke="#EF4444" stroke-width="2"/>

    <rect x="60" y="10" width="8" height="90" fill="#10B981" rx="2"/>
    <line x1="64" y1="0" x2="64" y2="10" stroke="#10B981" stroke-width="2"/>
    <line x1="64" y1="100" x2="64" y2="125" stroke="#10B981" stroke-width="2"/>

    <rect x="90" y="30" width="8" height="75" fill="#10B981" rx="2"/>
    <line x1="94" y1="10" x2="94" y2="30" stroke="#10B981" stroke-width="2"/>
    <line x1="94" y1="105" x2="94" y2="130" stroke="#10B981" stroke-width="2"/>
  </g>
</svg>
