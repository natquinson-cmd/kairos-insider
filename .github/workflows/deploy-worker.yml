name: Deploy Worker

# Deploy le Worker Cloudflare via GitHub Actions
# (alternative quand wrangler login local a expire / Cloudflare incidents)
#
# Trigger : workflow_dispatch (manuel) ou push sur worker/src/**

on:
  workflow_dispatch:
  push:
    paths:
      - 'worker/src/**'
      - 'worker/wrangler.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: |
          cd worker
          # wrangler est en devDependency dans worker/, on l'utilise via npx
          npm install --save-dev wrangler@4

      - name: Deploy worker code (tolerant aux erreurs de routes)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          # wrangler deploy peut echouer sur le refresh des routes brandees
          # (kairosinsider.fr) si le token n'a pas la permission Zone:Read.
          # Or les routes existent deja et ne changent pas, donc cette erreur
          # est cosmetique : le code worker EST bien upload (verifie via
          # 'Uploaded kairos-insider-api X.XX sec' dans les logs).
          # On capture la sortie et on retourne 0 si l'upload a reussi.
          set +e
          OUTPUT=$(npx wrangler deploy 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Uploaded kairos-insider-api"; then
            echo "::notice::Worker code upload reussi (exit reel=$EXIT_CODE)"
            if [ $EXIT_CODE -ne 0 ]; then
              echo "::warning::Routes refresh a echoue (token sans Zone:Read sur kairosinsider.fr) - routes existantes preservees, code est live"
            fi
            exit 0
          fi
          echo "::error::Vrai echec : worker non upload"
          exit 1
