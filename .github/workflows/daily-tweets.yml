name: Daily Tweets → Email

# Envoie chaque matin un email avec les 3 tweets du jour,
# generes a partir des signaux Kairos (clusters insiders, 13D
# activists, score movers). L'utilisateur recoit l'email dans sa
# boite admin et peut copier/poster sur X (ou planifier dans
# Typefully/Buffer manuellement).
#
# Prerequis :
# - BREVO_API_KEY configure comme secret Cloudflare (deja fait)
# - ADMIN_API_KEY configure comme secret Cloudflare
# - KAIROS_ADMIN_API_KEY configure comme secret GitHub (meme valeur)

on:
  schedule:
    # 6h30 UTC = 8h30 Paris (ete) / 7h30 Paris (hiver)
    # Tourne APRES le cron de prefetch des signaux (15 6 * * * UTC)
    # pour avoir la data fraiche.
    - cron: '30 6 * * *'
  workflow_dispatch:  # run manuel depuis GitHub UI

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily tweets email via Brevo
        env:
          ADMIN_API_KEY: ${{ secrets.KAIROS_ADMIN_API_KEY }}
          WORKER_URL: https://kairos-insider-api.natquinson.workers.dev
        run: |
          if [ -z "$ADMIN_API_KEY" ]; then
            echo "::warning::KAIROS_ADMIN_API_KEY not set — skipping."
            exit 0
          fi
          echo "Calling /api/admin/daily-tweets/email..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Admin-API-Key: $ADMIN_API_KEY" \
            -H "Content-Type: application/json" \
            "${WORKER_URL}/api/admin/daily-tweets/email")
          status_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          echo "HTTP $status_code"
          echo "$body"
          if [ "$status_code" != "200" ]; then
            echo "::error::Email send failed (HTTP $status_code)"
            exit 1
          fi
          echo ""
          echo "::notice::Email envoyé à l'admin avec les tweets du jour."
