name: Daily Tweets → Typefully

# Pousse chaque matin 3 drafts de tweets dans la queue Typefully,
# generes a partir des signaux Kairos du jour (clusters insiders,
# 13D activists, score movers). L'utilisateur approuve/edite depuis
# l'app Typefully et planifie la publication.
#
# Prerequis :
# - TYPEFULLY_API_KEY configure comme secret Cloudflare
#   (wrangler secret put TYPEFULLY_API_KEY)
# - ADMIN_API_KEY configure comme secret Cloudflare (cote worker)
#   (wrangler secret put ADMIN_API_KEY) — clef long-lived
# - KAIROS_ADMIN_API_KEY configure comme secret GitHub (meme valeur que
#   ADMIN_API_KEY cote Cloudflare) — permet au workflow d'appeler le worker
#   via le header X-Admin-API-Key (bypass du token Firebase qui expire en 1h).

on:
  schedule:
    # 7h30 UTC = 9h30 Paris (ete) / 8h30 Paris (hiver)
    # Tourne APRES le cron de prefetch des signaux (15 6 * * * UTC)
    # pour etre sur d'avoir la data fraiche du jour.
    - cron: '30 7 * * *'
  workflow_dispatch:  # run manuel depuis GitHub UI

jobs:
  push-tweets:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Typefully push endpoint
        env:
          ADMIN_API_KEY: ${{ secrets.KAIROS_ADMIN_API_KEY }}
          WORKER_URL: https://kairos-insider-api.natquinson.workers.dev
        run: |
          if [ -z "$ADMIN_API_KEY" ]; then
            echo "::warning::KAIROS_ADMIN_API_KEY not set — skipping."
            exit 0
          fi
          echo "Calling /api/admin/typefully/push via X-Admin-API-Key..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Admin-API-Key: $ADMIN_API_KEY" \
            -H "Content-Type: application/json" \
            "${WORKER_URL}/api/admin/typefully/push")
          status_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          echo "HTTP $status_code"
          echo "$body" | head -c 2000
          if [ "$status_code" != "200" ]; then
            echo "::error::Typefully push failed (HTTP $status_code)"
            exit 1
          fi
          echo ""
          echo "::notice::Tweets poussés dans Typefully — valider depuis l'app."
