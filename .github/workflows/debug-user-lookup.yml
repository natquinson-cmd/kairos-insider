name: Debug User Lookup

# Workflow one-shot pour inspecter les donnees brutes d'un user en KV.
# Utile pour diagnostiquer les cas "lang null" ou "user record manquant".
# Trigger : workflow_dispatch (manuel).

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email du user a inspecter'
        required: true

jobs:
  lookup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      KAIROS_ADMIN_API_KEY: ${{ secrets.KAIROS_ADMIN_API_KEY }}
      API_BASE: 'https://kairos-insider-api.natquinson.workers.dev'
      EMAIL: ${{ github.event.inputs.email }}
    steps:
      - name: Inspect user via /api/admin/users + /api/admin/debug-user
        run: |
          set -e
          echo "::group::GET /api/admin/users -> find $EMAIL"
          USERS_JSON=$(curl -sS -H "X-Admin-API-Key: $KAIROS_ADMIN_API_KEY" "$API_BASE/api/admin/users")
          echo "$USERS_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          email = '$EMAIL'.lower()
          match = [u for u in d.get('users', []) if (u.get('email') or '').lower() == email]
          if not match:
            print('USER NOT FOUND for email=' + email)
            print('Total users in KV:', d.get('total'))
            sys.exit(0)
          print(json.dumps(match[0], indent=2, ensure_ascii=False))
          "
          echo "::endgroup::"

          echo "::group::GET /api/admin/debug-user?email=$EMAIL -> raw KV"
          curl -sS -H "X-Admin-API-Key: $KAIROS_ADMIN_API_KEY" "$API_BASE/api/admin/debug-user?email=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$EMAIL'))")" | python3 -m json.tool
          echo "::endgroup::"

          echo "::group::Brevo contact lookup"
          curl -sS -H "X-Admin-API-Key: $KAIROS_ADMIN_API_KEY" "$API_BASE/api/admin/brevo-contact?email=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$EMAIL'))")" | python3 -m json.tool || echo "Brevo lookup failed (peut-etre user pas dans Brevo Contacts)"
          echo "::endgroup::"
