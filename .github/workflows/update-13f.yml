name: Update 13F + ETF Data

on:
  schedule:
    # Tous les jours a 1h30 UTC = 3h30 Paris (ete) / 2h30 Paris (hiver)
    # Decale tot car GitHub Actions a typiquement +1-2h de retard sur les
    # heures pleines a forte charge. Avec retard max, finit a ~6h20 Paris.
    # Heures HH:30 evitent le pic top-of-hour de queue GitHub.
    # Run total: ~50 min (insiders SEC + AMF + BaFin + 13F + ETFs + Trends)
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    # Expose les secrets Cloudflare au niveau du job : tous les steps (et leurs
    # subprocess Python comme kv_lastrun.log_last_run) heritent automatiquement
    # de ces variables. Sans ca, wrangler kv put tombe en 'non-interactive env'
    # error et tous les lastRun:* ne sont pas ecrits → badges STALE permanents.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Wrangler
        run: npm install -g wrangler

      # ===== 13F V2 : Discovery hebdo des top 200 fonds =====
      - name: Compute day of week
        id: dow
        run: echo "day=$(date -u +%u)" >> $GITHUB_OUTPUT  # 1=Mon, 7=Sun

      - name: Discover top 200 hedge funds by AUM (weekly, Monday OR manual)
        # Tourne le lundi (UTC) en cron OU sur run manuel (workflow_dispatch)
        if: ${{ steps.dow.outputs.day == '1' || github.event_name == 'workflow_dispatch' }}
        id: discover
        run: cd worker && python discover-13f-funds.py
        timeout-minutes: 25
        continue-on-error: true

      # Si pas de discovery aujourd'hui : restaurer la derniere liste depuis KV
      - name: Restore 13f_funds_list.json from KV
        if: hashFiles('worker/13f_funds_list.json') == ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          if [ ! -f 13f_funds_list.json ]; then
            wrangler kv key get --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "13f-funds-list" > 13f_funds_list.json 2>/dev/null || rm -f 13f_funds_list.json
          fi
        continue-on-error: true

      - name: Upload 13f_funds_list.json to KV (cache for next runs)
        if: hashFiles('worker/13f_funds_list.json') != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "13f-funds-list" --path=13f_funds_list.json
          echo "13f-funds-list cached in KV"
        continue-on-error: true

      # Restaure le set de CIK 13D filers (= activistes factuels) depuis KV.
      # Genere la veille par build-13d-filer-set.py (cf. step plus bas apres fetch-13dg).
      # Si premier run / KV vide : prefetch-13f.py degrade gracieusement (isOffensive=false partout).
      - name: Restore 13d_filer_ciks.json from KV (used by prefetch-13f for OFFENSIF flag)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          wrangler kv key get --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "13d-filer-ciks" > 13d_filer_ciks.json 2>/dev/null && echo "Restored 13d_filer_ciks.json: $(wc -c < 13d_filer_ciks.json) bytes" || (rm -f 13d_filer_ciks.json && echo "No 13d_filer_ciks in KV yet (first run)")
        continue-on-error: true

      # ===== 13F prefetch (tous les jours, utilise la liste dynamique) =====
      - name: Fetch 13F data from SEC EDGAR (uses dynamic funds list)
        run: cd worker && python prefetch-13f.py
        timeout-minutes: 30
        continue-on-error: true

      - name: Upload 13F to KV
        if: hashFiles('worker/funds_data.json') != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          if [ -f funds_data.json ]; then
            wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "13f-all-funds" --path=funds_data.json
            echo "13F data uploaded"
          fi
          if [ -f 13f_ticker_index.json ]; then
            wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "13f-ticker-index" --path=13f_ticker_index.json
            echo "13F ticker index uploaded"
          fi
        continue-on-error: true

      # ===== TRANSACTIONS + CLUSTERS (unifie, tous les jours) =====
      - name: Download existing transactions from KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          wrangler kv key get --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "insider-transactions" > transactions_data.json 2>/dev/null || echo '{}' > transactions_data.json
          echo "Existing data: $(wc -c < transactions_data.json) bytes"
        continue-on-error: true

      - name: Unified fetch (Transactions + Clusters from same source)
        run: cd worker && python prefetch-all.py
        timeout-minutes: 20

      - name: Fetch BaFin Directors' Dealings (DE + Europe)
        run: cd worker && python fetch-bafin.py
        timeout-minutes: 5
        continue-on-error: true

      # 13D/G SCHEDULE filings : activists + large shareholders (>5% capital)
      # Plus rapide que 13F (10 jours vs 45) et signal activiste fort.
      # Strategie incremental : on download l'existant, on fetch les 10 derniers
      # jours, on merge + dedup, on push. Cap 2 ans d'historique.
      - name: Download existing 13D/G data from KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          wrangler kv key get --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "13dg-recent" > 13dg_existing.json 2>/dev/null || echo '{}' > 13dg_existing.json
          echo "Existing 13D/G: $(wc -c < 13dg_existing.json) bytes"
        continue-on-error: true

      - name: Fetch 13D/G Schedule filings (incremental + merge)
        # --days 3 suffit pour un cron quotidien (3 jours de marge vs 10).
        # PYTHONUNBUFFERED=1 : sinon les prints restent en buffer jusqu'a la fin
        # (non-TTY), et si le script est kill par timeout on ne voit RIEN.
        # timeout 55 min : l'enrichissement de ~5000 filings XML SEC avec timeout
        # individuel 20s peut etre lent quand beaucoup d'URL retournent vide/404.
        # Priorites d'enrichissement : P0 activists > P1 tickers populaires > P2 autres.
        env:
          PYTHONUNBUFFERED: '1'
        run: cd worker && python -u fetch-13dg.py --days 3 --merge-with 13dg_existing.json
        timeout-minutes: 55
        continue-on-error: true

      - name: Upload 13D/G filings to KV
        if: hashFiles('worker/13dg_data.json') != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "13dg-recent" --path=13dg_data.json
          echo "13D/G data uploaded"
        continue-on-error: true

      # =================================================================
      # 13D-DERIVED INDEXES : activistes factuels US + index UK/EU
      # =================================================================
      # Apres fetch-13dg, on derive 2 indexes critiques pour le badge OFFENSIF :
      #
      # 1. 13d_filer_ciks.json : set des CIK qui ont depose >=1 13D/A en 730j
      #    (= activistes factuels SEC, vs auto-declaration de categorie).
      #    Utilise par prefetch-13f le LENDEMAIN pour flag 'o' du ticker-index.
      #
      # 2. 13d_eu_uk_index.json : mapping ticker_primaire_EU/UK -> filings 13D
      #    (Cevian/Pearson PSON.L, Cevian/Smith&Nephew SN.L, Trian/JHG, etc.).
      #    Resolve les ADR US -> .L/.PA/.AS/.DE/.MI/etc. via Yahoo Search.
      #    Utilise par worker aggregate13F pour merger les activistes EU sur
      #    les tickers locaux (qui sinon n'ont pas de 13F-equivalent FCA/AMF).
      - name: Build 13D filer set (US activists factuels)
        if: hashFiles('worker/13dg_data.json') != ''
        run: cd worker && python build-13d-filer-set.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Upload 13d-filer-ciks to KV
        if: hashFiles('worker/13d_filer_ciks.json') != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "13d-filer-ciks" --path=13d_filer_ciks.json
          echo "13d-filer-ciks uploaded ($(python -c 'import json; print(len(json.load(open(\"13d_filer_ciks.json\")).get(\"cikList\",[])))') CIKs)"
        continue-on-error: true

      # Restaure le cache de mapping company_name -> primary_ticker UK/EU pour
      # eviter de re-resolver via Yahoo Search a chaque run (~250ms/lookup, 60 targets).
      - name: Restore eu_primary_ticker_cache.json
        uses: actions/cache@v4
        with:
          path: worker/eu_primary_ticker_cache.json
          key: eu-primary-ticker-cache-v1

      - name: Build EU/UK 13D index (Cevian/Pearson, Trian/JHG, etc.)
        if: hashFiles('worker/13dg_data.json') != ''
        run: cd worker && python build-eu-13d-index.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Upload 13d-eu-uk-index to KV
        if: hashFiles('worker/13d_eu_uk_index.json') != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "13d-eu-uk-index" --path=13d_eu_uk_index.json
          echo "13d-eu-uk-index uploaded ($(python -c 'import json; d=json.load(open(\"13d_eu_uk_index.json\")); print(d.get(\"tickerCount\",0))') tickers, $(python -c 'import json; d=json.load(open(\"13d_eu_uk_index.json\")); print(d.get(\"filingCount\",0))') filings)"
        continue-on-error: true

      - name: Fetch AMF Declarations dirigeants (FR + Euronext)
        run: cd worker && python fetch-amf.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Restore ISIN->ticker cache
        uses: actions/cache@v4
        with:
          path: worker/isin_ticker_cache.json
          key: isin-ticker-cache-v1

      - name: Enrich BaFin + AMF transactions with tickers (OpenFIGI)
        run: cd worker && python enrich-tickers.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Merge sources (SEC + BaFin + AMF) into unified transactions_data.json
        run: cd worker && python merge-sources.py
        timeout-minutes: 2

      - name: Upload Transactions + Clusters to KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          if [ -f transactions_data.json ]; then
            wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "insider-transactions" --path=transactions_data.json
            echo "Transactions uploaded"
          fi
          if [ -f clusters_data.json ]; then
            wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "insider-clusters" --path=clusters_data.json
            echo "Clusters uploaded"
          fi
        continue-on-error: true

      # ===== GOOGLE TRENDS (tous les jours) =====
      - name: Install pytrends (pin urllib3<2 pour compat method_whitelist)
        run: pip install pytrends pandas "urllib3<2" "requests<2.32"
        continue-on-error: true

      - name: Fetch Google Trends (top ~100 tickers)
        run: cd worker && python prefetch-trends.py
        timeout-minutes: 20
        continue-on-error: true

      - name: Upload Google Trends to KV
        if: hashFiles('worker/trends_data.json') != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          if [ -f trends_data.json ]; then
            wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "google-trends-data" --path=trends_data.json
            echo "Google Trends uploaded"
          fi
          if [ -f trends_hot.json ]; then
            wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "google-trends-hot" --path=trends_hot.json
            echo "Google Trends hot uploaded"
          fi
        continue-on-error: true

      # ===== ETF (tous les jours) =====
      - name: Fetch ETF data (NANC, GOP, GURU)
        run: cd worker && python prefetch-etf.py
        timeout-minutes: 5

      - name: Upload ETF data to KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          for etf in nanc gop guru buzz meme jepi jepq ita ura ufo mj moat dstl mtum pxf pid; do
            if [ -f "etf_${etf}.json" ]; then
              wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "etf-${etf}" --path="etf_${etf}.json"
              echo "Uploaded etf-${etf}"
            fi
          done

      # ===== SHORT INTEREST (top 50 US, daily) =====
      # Scrape highshortinterest.com -> top 50 actions US shortees + history 30j
      # par ticker pour calculer delta7d / delta30d / sparkline.
      # Le script lit l'existant KV puis append le snapshot du jour.
      - name: Fetch Short Interest top 50 (avec history 30j)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: cd worker && python prefetch-shorts.py
        timeout-minutes: 5
        continue-on-error: true

      # ===== HISTORIQUE D1 (snapshots ETF + 13F) =====
      # Pousse les holdings du jour dans la DB historique pour permettre
      # les comparaisons temporelles (ETF rotation, 13F evolution, etc.)
      - name: Push daily snapshots to D1 (kairos-history)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          python push-to-d1.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Push Kairos Scores quotidiens to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          # Permet au pipeline d'envoyer un rapport d'anomalies (email admin)
          # quand il detecte des deltas suspects (>=20pts) ou declenche le
          # circuit breaker (>10% des tickers avec delta >=15pts).
          KAIROS_ADMIN_API_KEY: ${{ secrets.KAIROS_ADMIN_API_KEY }}
        run: |
          cd worker
          python push-scores-to-d1.py
        timeout-minutes: 30
        continue-on-error: true

      # Pousse les transactions insiders (SEC Form 4 + BaFin + AMF) vers la DB
      # historique. Le KV garde un cache rolling 90j pour l'UI rapide,
      # mais D1 garde TOUT pour Top Insiders ROI, screener avance, etc.
      # INSERT OR IGNORE evite les doublons : on peut refaire un push sans risque.
      - name: Push Insider Transactions history to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          python push-insiders-to-d1.py
        timeout-minutes: 15
        continue-on-error: true

      - name: Summary
        run: |
          cd worker
          echo "=== 13F ==="
          python -c "
          import json, os
          if os.path.exists('funds_data.json'):
              with open('funds_data.json') as f: data = json.load(f)
              print(f'  {len(data)} funds updated')
          else:
              print('  Skipped (not Monday or failed)')
          " 2>/dev/null || true
          echo "=== ETF ==="
          for etf in nanc gop guru; do
            if [ -f "etf_${etf}.json" ]; then
              python -c "
          import json
          with open('etf_${etf}.json') as f: d = json.load(f)
          print(f'  ${etf}: {d.get(\"holdingsCount\",0)} positions')
          " 2>/dev/null || true
            fi
          done
