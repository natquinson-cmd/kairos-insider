name: Update 13F + ETF Data

on:
  schedule:
    # 13F: tous les lundis a 7h UTC (trimestriel mais on check chaque semaine)
    # ETF: tous les jours a 7h UTC (donnees quotidiennes)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Wrangler
        run: npm install -g wrangler

      # ===== 13F (seulement le lundi) =====
      - name: Fetch 13F data from SEC EDGAR
        if: github.event.schedule != '0 7 * * *' || contains('Mon', 'Mon')
        run: cd worker && python prefetch-13f.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Upload 13F to KV
        if: hashFiles('worker/funds_data.json') != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          if [ -f funds_data.json ]; then
            wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "13f-all-funds" --path=funds_data.json
            echo "13F data uploaded"
          fi
        continue-on-error: true

      # ===== TRANSACTIONS + CLUSTERS (unifie, tous les jours) =====
      - name: Download existing transactions from KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          wrangler kv key get --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "insider-transactions" > transactions_data.json 2>/dev/null || echo '{}' > transactions_data.json
          echo "Existing data: $(wc -c < transactions_data.json) bytes"
        continue-on-error: true

      - name: Unified fetch (Transactions + Clusters from same source)
        run: cd worker && python prefetch-all.py
        timeout-minutes: 20

      - name: Fetch BaFin Directors' Dealings (DE + Europe)
        run: cd worker && python fetch-bafin.py
        timeout-minutes: 5
        continue-on-error: true

      - name: Fetch AMF Declarations dirigeants (FR + Euronext)
        run: cd worker && python fetch-amf.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Restore ISIN->ticker cache
        uses: actions/cache@v4
        with:
          path: worker/isin_ticker_cache.json
          key: isin-ticker-cache-v1

      - name: Enrich BaFin + AMF transactions with tickers (OpenFIGI)
        run: cd worker && python enrich-tickers.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Merge sources (SEC + BaFin + AMF) into unified transactions_data.json
        run: cd worker && python merge-sources.py
        timeout-minutes: 2

      - name: Upload Transactions + Clusters to KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          if [ -f transactions_data.json ]; then
            wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "insider-transactions" --path=transactions_data.json
            echo "Transactions uploaded"
          fi
          if [ -f clusters_data.json ]; then
            wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "insider-clusters" --path=clusters_data.json
            echo "Clusters uploaded"
          fi
        continue-on-error: true

      # ===== ETF (tous les jours) =====
      - name: Fetch ETF data (NANC, GOP, GURU)
        run: cd worker && python prefetch-etf.py
        timeout-minutes: 5

      - name: Upload ETF data to KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          for etf in nanc gop guru; do
            if [ -f "etf_${etf}.json" ]; then
              wrangler kv key put --namespace-id=aca7ff9d2a244b06ae92d6a7129b4cc4 --remote "etf-${etf}" --path="etf_${etf}.json"
              echo "Uploaded etf-${etf}"
            fi
          done

      - name: Summary
        run: |
          cd worker
          echo "=== 13F ==="
          python -c "
          import json, os
          if os.path.exists('funds_data.json'):
              with open('funds_data.json') as f: data = json.load(f)
              print(f'  {len(data)} funds updated')
          else:
              print('  Skipped (not Monday or failed)')
          " 2>/dev/null || true
          echo "=== ETF ==="
          for etf in nanc gop guru; do
            if [ -f "etf_${etf}.json" ]; then
              python -c "
          import json
          with open('etf_${etf}.json') as f: d = json.load(f)
          print(f'  ${etf}: {d.get(\"holdingsCount\",0)} positions')
          " 2>/dev/null || true
            fi
          done
