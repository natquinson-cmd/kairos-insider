name = "kairos-insider-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Garde l'URL *.workers.dev active en parallele des routes brandees
# (le dashboard appelle kairos-insider-api.natquinson.workers.dev pour les /api/*)
workers_dev = true

# Import des .md comme strings (articles blog). Wrangler utilise esbuild en
# interne → la rule "Text" inline le contenu du fichier comme export default.
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

# WASM modules (resvg pour SVG -> PNG sur les OG images Twitter Card).
# La rule "CompiledWasm" exporte le module comme WebAssembly.Module direct.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# Polices embarquees pour le rendu OG image (resvg n'a pas de fallback systeme
# sur Cloudflare Workers). Inter Regular + Bold subset Latin (~67KB chacun).
# La rule "Data" exporte le fichier comme Uint8Array directement importable.
[[rules]]
type = "Data"
globs = ["**/*.ttf"]
fallthrough = true

# Routes Workers attachees a kairosinsider.fr (domaine dans le meme compte Cloudflare)
# - /a/*         : pages SSR publiques pour bots SEO + sociaux (tickers)
# - /blog, /blog/* : blog SEO (articles pillar, index, feed RSS)
# - /sitemap.xml : sitemap dynamique (overrides le statique de GitHub Pages)
# - /robots.txt  : robots.txt dynamique (overrides le statique de GitHub Pages)
# Tout le reste (index.html, action.html, dashboard.html, CSS, assets) continue
# d'etre servi par GitHub Pages via le proxy Cloudflare.
[[routes]]
pattern = "kairosinsider.fr/a/*"
zone_name = "kairosinsider.fr"

# OG images dynamiques pour les cartes Twitter / LinkedIn / Discord
# (visuels de partage avec donnees live par ticker, type "screenshot fiche").
[[routes]]
pattern = "kairosinsider.fr/og/*"
zone_name = "kairosinsider.fr"

[[routes]]
pattern = "kairosinsider.fr/blog"
zone_name = "kairosinsider.fr"

[[routes]]
pattern = "kairosinsider.fr/blog/*"
zone_name = "kairosinsider.fr"

[[routes]]
pattern = "kairosinsider.fr/sitemap.xml"
zone_name = "kairosinsider.fr"

[[routes]]
pattern = "kairosinsider.fr/robots.txt"
zone_name = "kairosinsider.fr"

[vars]
BREVO_TEMPLATE_ID = "1"
BREVO_SENDER_NAME = "Kairos Insider"
BREVO_SENDER_EMAIL = "contact@kairosinsider.fr"
ALLOWED_ORIGIN = "https://kairosinsider.fr"
FIREBASE_PROJECT_ID = "kairos-insider"
# Telegram bot username (sans @) pour construire les deep-links t.me/xxx?start=CODE.
# Le BOT_TOKEN et le WEBHOOK_SECRET sont des secrets (pas dans le code source) :
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_WEBHOOK_SECRET
TELEGRAM_BOT_USERNAME = "KairosInsiderBot"
# Ancien prix Premium 29€ (archive cote Stripe, grandfathered pour users existants).
# Fallback si aucun plan=X ne matche (ex: anciens liens en cache).
STRIPE_PRICE_ID = "price_1TM8ATDmX73q2YzDLtmLnk9k"
# Nouveau modele 3 plans : Free / Pro 19€ / Elite 49€ (cf MARKETING.md).
# Le worker route sur ces price_id en fonction de ?plan=pro|elite&billing=monthly|yearly
STRIPE_PRICE_ID_PRO_MONTHLY   = "price_1TPJeZDmX73q2YzDLo21qaKb"
STRIPE_PRICE_ID_PRO_ANNUAL    = "price_1TPJiBDmX73q2YzD1IlEHyfA"
STRIPE_PRICE_ID_ELITE_MONTHLY = "price_1TPJjXDmX73q2YzDFVyBhoV9"
STRIPE_PRICE_ID_ELITE_ANNUAL  = "price_1TPJlLDmX73q2YzD4tuBBjQh"

[[kv_namespaces]]
binding = "CACHE"
id = "aca7ff9d2a244b06ae92d6a7129b4cc4"

# DB historique (snapshots ETF / 13F / Kairos Score)
# Utilisee pour les comparaisons et evolutions long terme.
[[d1_databases]]
binding = "HISTORY"
database_name = "kairos-history"
database_id = "e26b41bc-9a11-42b4-a33e-e369f2fd7602"

# R2 bucket pour les backups quotidiens D1 + KV.
# Ecrit par le workflow GitHub Actions backup.yml (cron 1h UTC = 3h Paris).
# Le worker n'a besoin que de la lecture de meta/last-backup.json
# pour alimenter /api/admin/backup/status.
[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "kairos-backups"

# ============================================================
# CRON TRIGGERS
# ============================================================
# Watchlist daily digest : 4h UTC = 6h Paris (heure d'ete) / 5h Paris (hiver).
# Cloudflare Workers crons tournent PILE a l'heure (pas de retard contrairement
# a GitHub Actions). On tire apres le pipeline data GitHub (1h30 UTC = ~3h20 UTC
# en pire cas avec retard) donc 4h UTC laisse 40min de marge.
[triggers]
crons = ["0 4 * * *"]
