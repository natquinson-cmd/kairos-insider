name = "kairos-insider-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Routes Workers attachees a kairosinsider.fr (domaine dans le meme compte Cloudflare)
# - /a/*        : pages SSR publiques pour bots SEO + sociaux
# - /sitemap.xml : sitemap dynamique (overrides le statique de GitHub Pages)
# - /robots.txt  : robots.txt dynamique (overrides le statique de GitHub Pages)
# Tout le reste (index.html, action.html, dashboard.html, CSS, assets) continue
# d'etre servi par GitHub Pages via le proxy Cloudflare.
[[routes]]
pattern = "kairosinsider.fr/a/*"
zone_name = "kairosinsider.fr"

[[routes]]
pattern = "kairosinsider.fr/sitemap.xml"
zone_name = "kairosinsider.fr"

[[routes]]
pattern = "kairosinsider.fr/robots.txt"
zone_name = "kairosinsider.fr"

[vars]
BREVO_TEMPLATE_ID = "1"
BREVO_SENDER_NAME = "Kairos Insider"
BREVO_SENDER_EMAIL = "contact@kairosinsider.fr"
ALLOWED_ORIGIN = "https://kairosinsider.fr"
FIREBASE_PROJECT_ID = "kairos-insider"
STRIPE_PRICE_ID = "price_1TM8ATDmX73q2YzDLtmLnk9k"

[[kv_namespaces]]
binding = "CACHE"
id = "aca7ff9d2a244b06ae92d6a7129b4cc4"
